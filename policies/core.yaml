apiVersion: rutter.followingseas.dev/v2alpha1
kind: PolicySet

metadata:
  name: followingseas-core
  version: 1.0.0

spec:
  appliesTo:
    agents: [generic]
    repositories: ["*"]
    paths: ["**"]

  rules:
    - id: docs.why.required
      level: warn
      category: documentation
      statement: "모든 규약 문서에는 왜(Why)를 함께 적는다."
      rationale: "Why 없는 규칙은 지켜지지 않는다 — 사람과 AI가 같은 이유 체계를 공유해야 규약 준수율이 오른다."
      checks:
        - kind: markdown-heading-present
          # 규약 문서만 대상 — 지도(docs/maps)는 조망 문서라 Why 섹션을 강제하지 않는다
          target: docs/conventions/**
          heading: "Why"

    - id: docs.dual-audience
      level: info
      category: documentation
      statement: "문서는 사람이 읽기 좋게 쓰되, AI 에이전트가 그대로 실행할 수 있을 만큼 구체적으로 쓴다."
      rationale: "사람용 문서와 기계용 정책이 갈라지면 어느 한쪽이 낡는다 — 같은 문서가 두 독자를 섬겨야 한다."

    - id: maps.update-first
      level: warn
      category: documentation
      statement: "조직 구조가 바뀌면 docs/maps의 지도를 먼저 갱신한다."
      rationale: "낡은 지도는 좌초를 부른다 — 지도가 현행을 반영해야 나머지 문서와 자동화가 신뢰를 얻는다."
