apiVersion: rutter.followingseas.dev/v2alpha1
kind: PolicySet

metadata:
  name: followingseas-git
  version: 1.0.0

spec:
  appliesTo:
    agents: [generic]
    repositories: ["*"]
    paths: ["**"]

  rules:
    - id: git.flow.github-flow
      level: error
      category: workflow
      statement: "main 단일 브랜치 GitHub Flow를 따른다 — 작업은 feature/<이름> 브랜치에서 PR을 거쳐 main에 머지한다."
      rationale: "전 저장소 공통의 단순한 흐름이 리뷰·추적·자동화 분기를 일관되게 유지한다."
      examples:
        valid:
          - "feature/v2-release-engine"
        invalid:
          - "my-branch"
      checks:
        - kind: regex
          target: git.branch.name
          pattern: "^(main|feature/[a-z0-9._/-]+)$"
      remediation:
        - type: command
          run: "git checkout -b feature/<이름>"

    - id: git.commit.korean
      level: warn
      category: workflow
      statement: "커밋 메시지·PR·문서는 한글로 작성한다 (코드 식별자는 영어)."
      rationale: "조직의 일차 언어로 맥락을 남겨야 사람과 AI 모두 이유를 빠르게 파악한다."
