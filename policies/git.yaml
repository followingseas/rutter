apiVersion: rutter.followingseas.dev/v2alpha1
kind: PolicySet

metadata:
  name: followingseas-git
  version: 1.0.0

spec:
  appliesTo:
    agents: [generic]
    repositories: ["*"]
    paths: ["**"]

  rules:
    - id: git.branch.naming
      level: error
      category: workflow
      statement: "작업 브랜치는 feature/<이름> 형식을 사용한다."
      rationale: "GitHub Flow(main 단일 브랜치, PR 머지)의 전제 조건 — 브랜치 이름이 일관돼야 리뷰·추적·자동화 분기가 일관된다. PR 머지 여부는 저장소 보호 규칙이 담당하고, 이 rule은 기계 검증 가능한 이름 규칙만 검사한다."
      examples:
        valid:
          - "feature/v2-release-engine"
        invalid:
          - "my-branch"
      checks:
        - kind: regex
          target: git.branch.name
          pattern: "^(main|feature/[a-z0-9._/-]+)$"
      remediation:
        - type: command
          run: "git checkout -b feature/<이름>"

    - id: git.commit.korean
      level: warn
      category: workflow
      statement: "커밋 메시지는 한글로 작성한다 (코드 식별자·conventional commits 타입은 영어)."
      rationale: "조직의 일차 언어로 맥락을 남겨야 사람과 AI 모두 이유를 빠르게 파악한다. PR·문서의 한글 원칙은 docs.dual-audience 등 문서 규약이 담당한다."
      examples:
        valid:
          - "feat: values 계층 병합·locked field 추가"
        invalid:
          - "feat: add layered values merge"
      checks:
        - kind: regex
          # 제목 줄(첫 줄)에 한글이 포함되어야 한다 — 본문 어딘가 한 글자로는 통과하지 않는다
          target: git.commit.message
          pattern: "^[^\\n]*[가-힣][^\\n]*"
